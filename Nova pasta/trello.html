<body>

  <h1>Fazer login no Trello</h1>
  <form>

    <input type="password" name="senha" placeholder="Insira a senha"><br>
    <input type="submit" value="Fazer login">
    <br><br>
    <span>Ou</span>
    <br><br>
    <button><img src="/Nova pasta/img/google.svg" width="20" alt="Google"></imgimg> Continuar com o Google</button><br><br>
    <button ><img src="/Nova pasta/img/microsoft.svg" width="20" alt="Microsoft"> Continuar com a Microsoft</button><br><br>
    <button><img src="/Nova pasta/img/apple.svg" width="20" alt="Apple"> Continuar com a Apple</button><br><br>
    <button ><img src="/Nova pasta/img/slack.svg" width="20" alt="Stack">Continuar com a Stack</button><br><br>
  
  </form>
  <img src="/Nova pasta/img/atlassian.svg" width="200" alt="atlassian">
    <img src="/Nova pasta/img/analytics.svg" width="200" alt="analytics">
    <img src="/Nova pasta/img/interactive.svg" width="200" alt="interactive">
